version: '3.9'

services:
  app:
    build:
      context: .
      target: builder
    command: npm run start:dev
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-nestuser}
      DB_PASSWORD: ${DB_PASSWORD:-nestpassword}
      DB_DATABASE: ${DB_DATABASE:-nestdb}
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-nestuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nestpassword}
      POSTGRES_DB: ${DB_DATABASE:-nestdb}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-nestuser} -d ${DB_DATABASE:-nestdb}']
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'   # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - app

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
