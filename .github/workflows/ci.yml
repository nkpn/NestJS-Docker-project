name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nestuser
          POSTGRES_PASSWORD: nestpassword
          POSTGRES_DB: nestdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        env:
          NODE_ENV: test
          PORT: 3000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nestuser
          DB_PASSWORD: nestpassword
          DB_DATABASE: nestdb_test
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 1h
          RABBITMQ_URL: amqp://guest:guest@localhost:5672
        run: npm run test:e2e

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nestjs-orders-api:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            --name test-container \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USERNAME=nestuser \
            -e DB_PASSWORD=nestpassword \
            -e DB_DATABASE=nestdb \
            -e JWT_SECRET=test-secret \
            -e RABBITMQ_URL=amqp://guest:guest@localhost:5672 \
            nestjs-orders-api:${{ github.sha }}

          # Fail the job if the container exits immediately.
          sleep 5
          if ! docker ps --filter "name=test-container" --filter "status=running" --format '{{.Names}}' | grep -q '^test-container$'; then
            echo "Container failed to stay running. Logs:"
            docker logs test-container || true
            exit 1
          fi

          docker stop test-container 2>/dev/null || true
